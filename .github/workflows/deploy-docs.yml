name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs hub
        uses: actions/checkout@v5
        with:
          path: addon-wiki

      - name: Checkout Anki AI Automation
        uses: actions/checkout@v5
        with:
          repository: moritzvitt/anki-ai-automation
          path: my-addons/anki-ai-automation

      - name: Checkout Editor Focus Mode
        uses: actions/checkout@v5
        with:
          repository: moritzvitt/reorder-fields-in-editor
          path: my-addons/editor-focus-mode

      - name: Checkout Limit Search Results
        uses: actions/checkout@v5
        with:
          repository: moritzvitt/limit-search-results
          path: my-addons/limit-search-results

      - name: Checkout Cloze Formatting
        uses: actions/checkout@v5
        with:
          repository: moritzvitt/myaddon
          path: my-addons/misc-formatting

      - name: Checkout Order By Frequency
        uses: actions/checkout@v5
        with:
          repository: moritzvitt/order-by-frequency
          path: my-addons/order-by-frequency

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install docs dependencies
        working-directory: addon-wiki
        run: pip install -r requirements-docs.txt

      - name: Prepare missing add-on docs
        working-directory: addon-wiki
        run: ./scripts/prepare_my_addons_docs.sh

      - name: Build site
        working-directory: addon-wiki
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: addon-wiki/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
